<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50">
  <!-- Battery outline -->
  <rect x="10" y="15" width="30" height="20" rx="2" ry="2"
        fill="none" stroke="currentColor" stroke-width="2"/>

  <!-- Battery terminal/top -->
  <rect x="40" y="22" width="3" height="6"
        fill="currentColor"/>

  <!-- Lightning bolt inside battery -->
  <path d="M 27 19 L 20 27 L 24 27 L 21 35 L 28 27 L 24 27 Z"
        fill="currentColor"/>

  <!-- Distance indicator dots (representing range) -->
  <circle cx="15" cy="42" r="1.5" fill="currentColor"/>
  <circle cx="20" cy="42" r="1.5" fill="currentColor"/>
  <circle cx="25" cy="42" r="1.5" fill="currentColor"/>
  <circle cx="30" cy="42" r="1.5" fill="currentColor"/>
  <circle cx="35" cy="42" r="1.5" fill="currentColor"/>
</svg>
